replicaCount: 1

image:
  repository: myregistry.azurecr.io/queries-api
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 80
  nodePort: 30180

env:
  ASPNETCORE_ENVIRONMENT: Development

resources:
  limits:
    cpu: "1"
    memory: "1Gi"
  requests:
    cpu: "100m"
    memory: "256Mi"
