apiVersion: batch/v1
kind: Job
metadata:
  name: restart-proxy-{{ .Values.plugin.name | lower }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 1
  template:
    spec:
      serviceAccountName: plugin-deployer-sa
      restartPolicy: Never
      containers:
        - name: restart
          image: alpine/k8s:1.31.13
          command: ["/bin/sh", "-c"]
          args:
            - |
              JOB="plugin-{{ .Values.plugin.name | lower }}"
              echo "Waiting for job/$JOB to succeed..."
              kubectl wait --for=condition=complete "job/$JOB" --timeout=120s
              if [ $? -ne 0 ]; then
                echo "Job $JOB did not complete successfully, aborting restart."
                exit 1
              fi
              echo "Job $JOB completed successfully."

              DEPLOY="eck1-integration-proxy-{{ .Values.plugin.name | lower }}"
              echo "Checking if deployment/$DEPLOY exists..."
              if kubectl get deployment "$DEPLOY" > /dev/null 2>&1; then
                echo "Restarting deployment/$DEPLOY to reload plugin DLLs..."
                kubectl rollout restart deployment/"$DEPLOY"
              else
                echo "Deployment $DEPLOY not found (proxy not yet deployed), skipping restart."
              fi
