name: Publish ECK1.Reconciliation.Contracts

on:
  workflow_dispatch: {}
  push:
    branches: [ "main" ]
    paths:
      - 'src/Nuget/ECK1.Reconciliation.Contracts/**'
      - '.github/workflows/publish-nuget.reconciliation-contracts.yml'
      - '.github/workflows/publish-nuget-shared.yml'
      - '.github/scripts/update-version.sh'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    uses: ./.github/workflows/publish-nuget-shared.yml
    with:
      project_path: 'src/Nuget/ECK1.Reconciliation.Contracts'
      csproj_file: 'ECK1.Reconciliation.Contracts.csproj'
