apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  labels:
    app: {{ .Chart.Name }}
    orleans/serviceId: {{ .Chart.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
      orleans/serviceId: {{ .Chart.Name }}
  template:
    metadata:
      annotations:
        rollme: {{ now | quote }}
      labels:
        app: {{ .Chart.Name }}
        environment: {{ .Values.environment }}
        service_name: {{ .Chart.Name }}
        # This label identifies the service to Orleans
        orleans/serviceId: {{ .Chart.Name }}
        # This label identifies an instance of a cluster to Orleans.
        orleans/clusterId: {{ .Chart.Name }}
    spec:
      containers:
        - name: commands-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 80
            - containerPort: 11111 # Orleans Silo-to-Silo
            - containerPort: 30000 # Orleans Gateway for clients
          env:
            - name: SERVICE_NAME
              value: {{ .Chart.Name | quote }}

            - name: OTEL_SERVICE_NAME
              value: {{ .Chart.Name | quote }}
              
            - name: OTEL_SERVICE_VERSION
              value: {{ .Chart.AppVersion | quote }}

            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: global-vars
                  key: OTEL_EXPORTER_OTLP_ENDPOINT

            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              valueFrom:
                configMapKeyRef:
                  name: global-vars
                  key: OTEL_EXPORTER_OTLP_PROTOCOL

            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: {{ .Chart.Name }}-secrets
                  key: appConnectionString

            - name: VersionTracker__Url
              valueFrom:
                configMapKeyRef:
                  name: global-vars
                  key: VersionTracker__Url

            - name: Kafka__RealtimeFeedbackTopic
              valueFrom:
                configMapKeyRef:
                  name: global-vars
                  key: Kafka__RealtimeFeedbackTopic

            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: "{{ $value }}"
            {{- end }}
            - name: REDIS_CONNECTION
              value: "{{ .Values.redis.host }}:{{ .Values.redis.port }}"
            - name: ORLEANS_HOSTING
              value: k8s
            - name: ORLEANS_SERVICE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['orleans/serviceId']
            - name: ORLEANS_CLUSTER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['orleans/clusterId']
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: DOTNET_SHUTDOWNTIMEOUTSECONDS
              value: "120"

          {{- if .Values.resources }}
          resources: {{- toYaml .Values.resources | nindent 12 }}
          {{- end }}

          volumeMounts:
            - name: kafka-client-secret
              mountPath: /etc/secrets
              readOnly: true
            - name: config
              mountPath: /config
      volumes:
        - name: kafka-client-secret
          secret:
            secretName: kafka-client-secret
        - name: config
          configMap:
            name: eck1-commands-integration-manifest
