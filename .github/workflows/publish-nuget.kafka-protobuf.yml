name: Publish ECK1.Kafka.ProtoBuf

on:
  workflow_dispatch: {}
  push:
    branches: [ "main" ]
    paths:
      - 'src/Nuget/ECK1.Kafka.ProtoBuf/**'
      - '.github/workflows/publish-nuget.kafka-protobuf.yml'
      - '.github/workflows/publish-nuget-shared.yml'
      - '.github/scripts/update-version.sh'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    uses: ./.github/workflows/publish-nuget-shared.yml
    with:
      project_path: 'src/Nuget/ECK1.Kafka.ProtoBuf'
      csproj_file: 'ECK1.Kafka.ProtoBuf.csproj'
