{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eck1-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eck1-redis
  template:
    metadata:
      labels:
        app: eck1-redis
        environment: {{ .Values.environment | default "default" }}
        service_name: eck1-redis
    spec:
      containers:
        - name: redis
          image: "{{ .Values.redis.image }}"
          ports:
            - containerPort: {{ .Values.redis.service.port }}
          volumeMounts:
            - name: redis-data
              mountPath: /data
          env:
          - name: ALLOW_EMPTY_PASSWORD
            value: "yes"

          {{- if .Values.redis.resources }}
          resources: {{- toYaml .Values.redis.resources | nindent 12 }}
          {{- end }}

      volumes:
{{- if .Values.redis.persistence.enabled }}
  {{- if .Values.redis.persistence.hostPath.enabled }}
        - name: redis-data
          hostPath:
            path: "{{ .Values.redis.persistence.hostPath.path }}"
            type: DirectoryOrCreate
  {{- else }}
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-pvc
  {{- end }}
{{- else }}
        - name: redis-data
          emptyDir: {}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.redis.service.name | quote }}
spec:
  type: {{ .Values.redis.service.type }}
  selector:
    app: eck1-redis
  ports:
    - protocol: TCP
      port: {{ .Values.redis.service.port }}
      {{- if .Values.redis.service.nodePort }}
      nodePort: {{ .Values.redis.service.nodePort }}
      {{- end }}
      targetPort: {{ .Values.redis.service.port }}
{{- end }}
