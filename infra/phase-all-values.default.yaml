elasticsearch:
  namespace: elasticsearch
  image: docker.elastic.co/elasticsearch/elasticsearch:9.2.1
  resourcePrefix: elasticsearch
  port: 9200

zitadel:
  namespace: zitadel
  externalDomain: zitadel.localhost
  port: 8080
  chartVersion: "9.27.1"

kafka:
  namespace: kafka
  userSecretName: "kafka-user"

ingress:
  namespace: ingress-nginx
  ingressHttpPort: 30200
  ingressHttpsPort: 30443

apicurio:
  namespace: apicurio
  schemaRegistryUrlInternal: "http://apicurio-registry-service.apicurio.svc.cluster.local:8080/apis/ccompat/v7"

clickhouse:
  namespace: analytics
  resourcePrefix: clickhouse
  port: 8123
  database: eck1_analytics
  username: default
  password: default
  compress: "True"

mongo:
  serviceName: eck1-mongo
  port: 27017
  image: mongo:6.0
  connections:
    eck1:
      serviceName: eck1-mongo
      port: 27017
      databaseName: eck1-queries

observability:
  namespace: observability
  otlpService: "otel-collector-opentelemetry-collector"
  otlpPort: "4317"
  otlpProtocol: grpc
  otelCollectorImage:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.143.0"
