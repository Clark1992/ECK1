name: Publish ECK1.AsyncApi

on:
  workflow_dispatch: {}
  push:
    branches: [ "main" ]
    paths:
      - 'src/Nuget/ECK1.AsyncApi/**'
      - '.github/workflows/publish-nuget.async-api.yml'
      - '.github/workflows/publish-nuget-shared.yml'
      - '.github/scripts/update-version.sh'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    uses: ./.github/workflows/publish-nuget-shared.yml
    with:
      project_path: 'src/Nuget/ECK1.AsyncApi'
      csproj_file: 'ECK1.AsyncApi.csproj'
