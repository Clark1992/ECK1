name: Publish ECK1.Integration.Config

on:
  workflow_dispatch: {}
  push:
    branches: [ "main" ]
    paths:
      - 'src/Nuget/ECK1.Integration.Config/**'
      - '.github/workflows/publish-nuget.integration-config.yml'
      - '.github/workflows/publish-nuget-shared.yml'
      - '.github/scripts/update-version.sh'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    uses: ./.github/workflows/publish-nuget-shared.yml
    with:
      project_path: 'src/Nuget/ECK1.Integration.Config'
      csproj_file: 'ECK1.Integration.Config.csproj'
