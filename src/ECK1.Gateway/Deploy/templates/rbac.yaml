apiVersion: v1
kind: ServiceAccount
metadata:
  name: eck1-gateway
---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: eck1-gateway-service-reader
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: eck1-gateway-service-reader-binding
subjects:
  - kind: ServiceAccount
    name: eck1-gateway
roleRef:
  kind: Role
  name: eck1-gateway-service-reader
  apiGroup: rbac.authorization.k8s.io
