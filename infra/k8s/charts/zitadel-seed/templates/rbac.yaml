apiVersion: v1
kind: ServiceAccount
metadata:
  name: zitadel-seed
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: zitadel-seed-role
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: zitadel-seed-binding
subjects:
  - kind: ServiceAccount
    name: zitadel-seed
roleRef:
  kind: Role
  name: zitadel-seed-role
  apiGroup: rbac.authorization.k8s.io
